<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>企业业务智能体作战图</title>
  <meta name="description" content="覆盖财务、营销、制造、供应链、采购、主数据、人力、法务、经营分析与客服的企业业务智能体门户。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <header class="site-header">
    <nav class="topbar" aria-label="页面导航">
      <a class="brand" href="#top" aria-label="企业业务智能体作战图">
        <span class="brand-mark">EA</span>
        <span>Enterprise Capability Atlas</span>
      </a>
      <div class="topbar-actions">
        <div class="discovery-controls" aria-label="能力搜索与筛选">
          <label class="search-box" for="agentSearch">
            <span aria-hidden="true">⌕</span>
            <input id="agentSearch" type="search" placeholder="跨全部板块搜索能力 / 场景 / 成效">
          </label>
        </div>
      </div>
    </nav>

    <section class="hero" id="top">
      <div class="hero-copy">
        <h1>企业业务智能体作战图</h1>
        <p class="hero-lede">把财务、营销、制造、供应链、采购、主数据、人力、法务、经营分析与客服售后放在同一张运营视图里，帮助管理层快速判断能力分布、落地优先级与业务收益。</p>
      </div>
    </section>
  </header>

  <main>
    <section class="workspace" id="agent-tabs">
      <div class="tab-shell">
        <div class="tabs" id="tabs" role="tablist" aria-label="企业板块"></div>
        <div class="panel-toolbar">
          <div class="panel-heading">
            <p class="panel-kicker" id="panelKicker"></p>
            <h3 id="panelTitle"></h3>
          </div>
        </div>
        <p class="panel-description" id="panelDescription"></p>
        <div class="agent-grid" id="agentGrid"></div>
      </div>
    </section>

  </main>

  <dialog class="agent-modal" id="agentModal" aria-labelledby="modalTitle">
    <div class="modal-shell">
      <button class="modal-close" id="modalClose" type="button" aria-label="关闭">×</button>
      <div class="modal-visual" id="modalVisual"></div>
      <div class="modal-content">
        <p class="modal-domain" id="modalDomain"></p>
        <h2 id="modalTitle"></h2>
        <p id="modalSummary"></p>
        <div class="modal-tags" id="modalTags"></div>
        <div class="detail-grid">
          <section>
            <h3>核心功能</h3>
            <p id="modalFunction"></p>
          </section>
          <section>
            <h3>场景示意</h3>
            <p id="modalScenario"></p>
          </section>
          <section>
            <h3>业务效果</h3>
            <p id="modalImpact"></p>
          </section>
          <section>
            <h3>系统连接</h3>
            <p id="modalSystems"></p>
          </section>
        </div>
      </div>
    </div>
  </dialog>

  <dialog class="demo-modal" id="demoModal" aria-labelledby="demoModalTitle">
    <div class="demo-modal-shell">
      <button class="modal-close" id="demoModalClose" type="button" aria-label="关闭">×</button>
      <div class="demo-modal-content" id="demoModalContent"></div>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
