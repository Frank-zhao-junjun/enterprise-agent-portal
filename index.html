<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>企业业务智能体作战图</title>
  <meta name="description" content="覆盖财务、营销、制造、供应链、采购、主数据、人力、法务、经营分析与客服的企业业务智能体门户。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <header class="site-header">
    <nav class="topbar" aria-label="页面导航">
      <a class="brand" href="#top" aria-label="企业业务智能体作战图">
        <span class="brand-mark">EA</span>
        <span>Enterprise Capability Atlas</span>
      </a>
      <div class="topbar-actions">
        <div class="discovery-controls" aria-label="能力搜索与筛选">
          <label class="search-box" for="agentSearch">
            <span aria-hidden="true">⌕</span>
            <input id="agentSearch" type="search" placeholder="跨全部板块搜索能力 / 场景 / 成效">
          </label>
        </div>
        <button class="mcp-toolbar-btn" id="mcpPanelBtn" title="MCP Server 管理">
          <span aria-hidden="true">⚡</span> MCP
        </button>
      </div>
    </nav>

    <section class="hero" id="top">
      <div class="hero-copy">
        <h1>企业业务智能体作战图</h1>
        <p class="hero-lede">把财务、营销、制造、供应链、采购、主数据、人力、法务、经营分析与客服售后放在同一张运营视图里，帮助管理层快速判断能力分布、落地优先级与业务收益。</p>
      </div>
    </section>
  </header>

  <main>
    <section class="workspace" id="agent-tabs">
      <div class="tab-shell">
        <div class="tabs" id="tabs" role="tablist" aria-label="企业板块"></div>
        <div class="panel-toolbar">
          <div class="panel-heading">
            <p class="panel-kicker" id="panelKicker"></p>
            <h3 id="panelTitle"></h3>
          </div>
        </div>
        <p class="panel-description" id="panelDescription"></p>
        <div class="agent-grid" id="agentGrid"></div>
      </div>
    </section>

  </main>

  <dialog class="agent-modal" id="agentModal" aria-labelledby="modalTitle">
    <div class="modal-shell">
      <button class="modal-close" id="modalClose" type="button" aria-label="关闭">×</button>
      <div class="modal-visual" id="modalVisual"></div>
      <div class="modal-content">
        <p class="modal-domain" id="modalDomain"></p>
        <h2 id="modalTitle"></h2>
        <p id="modalSummary"></p>
        <div class="modal-tags" id="modalTags"></div>
        <div class="detail-grid">
          <section>
            <h3>核心功能</h3>
            <p id="modalFunction"></p>
          </section>
          <section>
            <h3>场景示意</h3>
            <p id="modalScenario"></p>
          </section>
          <section>
            <h3>业务效果</h3>
            <p id="modalImpact"></p>
          </section>
          <section>
            <h3>系统连接</h3>
            <p id="modalSystems"></p>
          </section>
        </div>
      </div>
    </div>
  </dialog>

  <dialog class="demo-modal" id="demoModal" aria-labelledby="demoModalTitle">
    <div class="demo-modal-shell">
      <button class="modal-close" id="demoModalClose" type="button" aria-label="关闭">×</button>
      <div class="demo-modal-content" id="demoModalContent"></div>
    </div>
  </dialog>

  <!-- MCP Client Panel -->
  <dialog class="mcp-panel" id="mcpPanel" aria-labelledby="mcpPanelTitle">
    <div class="mcp-panel-shell">
      <button class="modal-close" id="mcpPanelClose" type="button" aria-label="关闭">×</button>
      <div class="mcp-panel-content">
        <h2 id="mcpPanelTitle">MCP Server 连接管理</h2>

        <!-- Server Configuration Form -->
        <div class="mcp-section">
          <h3>添加 MCP Server</h3>
          <div class="mcp-form">
            <div class="mcp-form-row">
              <label>Server 名称</label>
              <input type="text" id="mcpServerName" placeholder="如: erp-mcp-server" />
            </div>
            <div class="mcp-form-row">
              <label>传输协议</label>
              <select id="mcpTransport">
                <option value="sse">SSE</option>
                <option value="stdio">Stdio</option>
              </select>
            </div>
            <div class="mcp-form-row" id="mcpUrlRow">
              <label>Server URL</label>
              <input type="text" id="mcpServerUrl" placeholder="如: http://localhost:8080/sse" />
            </div>
            <div class="mcp-form-row" id="mcpCommandRow" style="display:none">
              <label>命令</label>
              <input type="text" id="mcpCommand" placeholder="如: npx my-mcp-server" />
            </div>
            <div class="mcp-form-row">
              <label>关联板块</label>
              <select id="mcpDomain">
                <option value="*">全部板块</option>
                <option value="财务">财务</option>
                <option value="销售与营销">销售与营销</option>
                <option value="制造与交付">制造与交付</option>
                <option value="供应链">供应链</option>
                <option value="采购">采购</option>
                <option value="人力资源">人力资源</option>
                <option value="法务合规">法务合规</option>
                <option value="客服及售后品质">客服及售后品质</option>
                <option value="主数据和经营分析">主数据和经营分析</option>
              </select>
            </div>
            <button class="mcp-btn mcp-btn-primary" id="mcpConnectBtn">连接 Server</button>
          </div>
        </div>

        <!-- Connected Servers -->
        <div class="mcp-section">
          <h3>已连接的 Server</h3>
          <div id="mcpServerList" class="mcp-server-list">
            <p class="mcp-empty">暂无连接</p>
          </div>
        </div>

        <!-- Discovered Tools -->
        <div class="mcp-section">
          <h3>可用工具</h3>
          <div id="mcpToolList" class="mcp-tool-list">
            <p class="mcp-empty">连接 Server 后自动发现工具</p>
          </div>
        </div>
      </div>
    </div>
  </dialog>

  <!-- Agent Chat Dialog -->
  <dialog class="chat-dialog" id="chatDialog" aria-labelledby="chatDialogTitle">
    <div class="chat-shell">
      <button class="modal-close" id="chatClose" type="button" aria-label="关闭">×</button>
      <div class="chat-content">
        <div class="chat-header">
          <h2 id="chatDialogTitle"></h2>
          <span class="chat-status" id="chatStatus"></span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="输入消息，与 Agent 对话..." />
          <button class="mcp-btn mcp-btn-primary" id="chatSendBtn">发送</button>
        </div>
      </div>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
