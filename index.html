<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Architecture Designer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<style>
/* === RESET & BASE === */
*{margin:0;padding:0;box-sizing:border-box}
:root {
  --bg:#f8fafc; --surface:#ffffff; --surface-2:#f1f5f9;
  --border:#e2e8f0; --text:#0f172a; --text-2:#64748b;
  --primary:#2563eb; --primary-2:#1d4ed8;
  --success:#059669; --warning:#d97706;
  --danger:#dc2626; --info:#0891b2;
  --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.1);
  --shadow-lg:0 4px 16px rgba(0,0,0,.12);
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* === LAYOUT === */
.layout{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.logo{font-size:24px}
.header-title{font-size:18px;font-weight:700;color:var(--text)}
.header-title span{font-size:12px;color:var(--text-2);font-weight:400;margin-left:8px}
.header-right{display:flex;align-items:center;gap:10px}
.lang-btn{padding:6px 14px;border:1px solid var(--border);background:var(--surface);border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);transition:all .2s}
.lang-btn:hover{background:var(--surface-2)}
.lang-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.main{display:flex;flex:1;overflow:hidden}
/* === SIDEBAR === */
.sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:13px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.new-agent-btn{width:100%;padding:9px 14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s}
.new-agent-btn:hover{background:var(--primary-2)}
.agent-list{flex:1;overflow-y:auto;padding:8px}
.agent-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:all .15s;display:flex;align-items:center;gap:8px}
.agent-item:hover{background:var(--surface-2)}
.agent-item.active{background:#eff6ff;border:1px solid #bfdbfe}
.agent-item-icon{font-size:16px;flex-shrink:0}
.agent-item-name{font-size:14px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-item-category{font-size:10px;color:var(--text-2);padding:2px 6px;background:var(--surface-2);border-radius:10px;flex-shrink:0}
.agent-item-delete{opacity:0;padding:4px;background:none;border:none;cursor:pointer;color:var(--text-2);border-radius:4px;font-size:14px;transition:all .15s}
.agent-item:hover .agent-item-delete{opacity:1}
.agent-item-delete:hover{color:var(--danger);background:#fee2e2}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.empty-hint{text-align:center;color:var(--text-2);font-size:13px;padding:20px 0}
/* === MAIN CONTENT === */
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
/* === AGENT HEADER === */
.agent-header{padding:20px 24px 0;border-bottom:1px solid var(--border);background:var(--surface)}
.agent-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.agent-name-input{font-size:22px;font-weight:700;border:none;background:transparent;outline:none;color:var(--text);width:100%;padding:4px 0;border-bottom:2px solid transparent;transition:border-color .2s}
.agent-name-input:focus{border-bottom-color:var(--primary)}
.agent-name-input::placeholder{color:var(--text-2)}
.agent-header-meta{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text-2)}
.agent-header-meta span{display:flex;align-items:center;gap:4px}
.version-tabs{display:flex;gap:0;margin-top:4px}
.version-tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s}
.version-tab:hover{color:var(--text)}
.version-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.new-version-btn{padding:8px 16px;font-size:13px;font-weight:500;color:var(--primary);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s}
.new-version-btn:hover{border-bottom-color:var(--primary)}
/* === TABS === */
.tabs{display:flex;gap:0;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:12px 20px;font-size:14px;font-weight:500;color:var(--text-2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-badge{padding:2px 7px;background:var(--surface-2);border-radius:10px;font-size:11px;font-weight:600;color:var(--text-2)}
.tab-content{flex:1;overflow-y:auto;padding:24px}
/* === FORMS === */
.form-section{margin-bottom:28px}
.form-section-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:6px;display:block}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border-color .2s;resize:vertical}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-textarea{min-height:120px;font-family:inherit}
.form-hint{font-size:12px;color:var(--text-2);margin-top:4px}
/* === DEMO VERSION LIST === */
.demo-list{margin-top:16px}
.demo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:all .2s}
.demo-card:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.demo-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.demo-card-version{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.demo-card-version .version-badge{padding:2px 8px;background:#eff6ff;color:var(--primary);border-radius:10px;font-size:12px;font-weight:600}
.demo-card-time{font-size:12px;color:var(--text-2)}
.demo-card-summary{font-size:13px;color:var(--text-2);margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap}
.demo-card-summary span{display:flex;align-items:center;gap:4px}
.demo-card-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-2)}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:#e2e8f0}
.btn-danger{background:#fee2e2;color:var(--danger)}
.btn-danger:hover{background:#fecaca}
.btn-success{background:#d1fae5;color:var(--success)}
.btn-success:hover{background:#a7f3d0}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* === GENERATE SECTION === */
.generate-section{background:linear-gradient(135deg,#eff6ff 0%,#f5f3ff 100%);border:1px solid #bfdbfe;border-radius:var(--radius);padding:24px;margin-top:16px;text-align:center}
.generate-section h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.generate-section p{font-size:13px;color:var(--text-2);margin-bottom:16px;max-width:500px;margin-left:auto;margin-right:auto}
.generate-btn{width:100%;max-width:320px;padding:12px 24px;background:var(--primary);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.generate-btn:hover{background:var(--primary-2);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.generate-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
/* === GENERATING STATE === */
.generating-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.generating-card{background:var(--surface);border-radius:16px;padding:32px;max-width:500px;width:90%;box-shadow:var(--shadow-lg)}
.generating-title{font-size:18px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.generating-steps{font-size:13px;color:var(--text-2);margin-bottom:20px}
.generating-stream{background:var(--surface-2);border-radius:8px;padding:16px;min-height:100px;max-height:200px;overflow-y:auto;font-size:13px;color:var(--text);line-height:1.6;font-family:monospace;white-space:pre-wrap;margin-bottom:20px}
.generating-stream .thinking{color:var(--primary)}
.generating-stream .done{color:var(--success);font-weight:600}
.generating-actions{display:flex;justify-content:center}
/* === DEMO MODE === */
.demo-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;overflow:hidden}
.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.demo-header-left{display:flex;align-items:center;gap:12px}
.back-btn{padding:7px 14px;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:6px}
.back-btn:hover{background:#e2e8f0}
.demo-title{font-size:16px;font-weight:600;color:var(--text)}
.demo-title span{font-size:13px;color:var(--text-2);font-weight:400;margin-left:6px}
.scenario-select{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:var(--surface);cursor:pointer}
.demo-body{display:flex;flex:1;overflow:hidden}
.demo-chat{flex:0 0 42%;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden}
.demo-chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text)}
.demo-chat-header .scenario-tag{padding:2px 8px;background:#eff6ff;color:var(--primary);border-radius:10px;font-size:11px;font-weight:600}
.demo-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{margin-bottom:4px}
.msg-customer .msg-bubble{background:#eff6ff;border:1px solid #bfdbfe;margin-left:0}
.msg-agent .msg-bubble{background:var(--surface-2);margin-right:40px}
.msg-tool .msg-bubble{background:#fef9c3;border:1px solid #fde047;margin-left:20px;font-size:13px}
.msg-handoff .msg-bubble{background:#f0fdf4;border:1px solid #86efac;margin-left:20px;font-size:13px}
.msg-guardrail .msg-bubble{background:#fee2e2;border:1px solid #fca5a5;margin-left:20px;font-size:13px}
.msg-constraint .msg-bubble{background:#fef3c7;border:1px solid #fcd34d;margin-left:20px;font-size:13px}
.msg-escalation .msg-bubble{background:#fff7ed;border:1px solid #fed7aa;margin-left:20px;font-size:13px}
.msg-routing .msg-bubble{background:#eff6ff;border:1px solid #93c5fd;margin-left:20px;font-size:13px}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5}
.msg-label{font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.msg-customer .msg-label{color:#2563eb}
.msg-agent .msg-label{color:var(--text-2)}
.msg-tool .msg-label{color:#a16207}
.msg-rule{font-size:11px;font-weight:600;margin-bottom:4px;padding:3px 8px;border-radius:10px;display:inline-block}
.msg-rule.guardrail{background:#fee2e2;color:var(--danger)}
.msg-rule.constraint{background:#fef3c7;color:#a16207}
.msg-rule.escalation{background:#fff7ed;color:#c2410c}
.msg-rule.routing{background:#eff6ff;color:#2563eb}
.demo-agent{flex:1;overflow-y:auto;padding:16px;background:var(--bg)}
.demo-agent-section{margin-bottom:20px}
.demo-agent-section-title{font-size:13px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.agent-active-card{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-radius:10px;border:2px solid var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.agent-active-icon{font-size:24px}
.agent-active-name{font-size:15px;font-weight:700;color:var(--text)}
.agent-active-role{font-size:12px;color:var(--text-2)}
.agent-active-badge{padding:2px 8px;background:var(--primary);color:#fff;border-radius:10px;font-size:11px;font-weight:600;margin-left:auto}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:8px}
.agent-mini-card{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border-radius:8px;border:1px solid var(--border);transition:all .15s}
.agent-mini-card.active{border-color:var(--primary);background:#eff6ff}
.agent-mini-icon{font-size:18px}
.agent-mini-name{font-size:12px;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-mini-card .active-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0;display:none}
.agent-mini-card.active .active-dot{display:block}
.context-box{background:var(--surface);border-radius:8px;border:1px solid var(--border);padding:12px;margin-top:8px}
.context-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)}
.context-row:last-child{border-bottom:none}
.context-label{color:var(--text-2)}
.context-value{font-weight:500;color:var(--text);font-family:monospace;font-size:12px}
.rules-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.rule-mini-card{padding:10px 12px;background:var(--surface);border-radius:8px;border:1px solid var(--border)}
.rule-mini-name{font-size:12px;font-weight:600;margin-bottom:4px}
.rule-mini-status{font-size:11px;padding:2px 6px;border-radius:8px;font-weight:600;display:inline-block}
.rule-mini-status.passed{background:#d1fae5;color:var(--success)}
.rule-mini-status.pending{background:var(--surface-2);color:var(--text-2)}
.rule-mini-status.failed{background:#fee2e2;color:var(--danger)}
.events-list{margin-top:8px;max-height:200px;overflow-y:auto}
.event-item{font-size:12px;padding:6px 10px;background:var(--surface);border-radius:6px;border-left:3px solid var(--primary);margin-bottom:4px;font-family:monospace;color:var(--text-2)}
.event-item.success{border-left-color:var(--success)}
.event-item.error{border-left-color:var(--danger)}
.event-item.info{border-left-color:var(--info)}
.demo-footer{padding:12px 20px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.demo-controls{display:flex;align-items:center;gap:8px}
.demo-step-label{font-size:13px;color:var(--text-2);min-width:80px;text-align:center}
.progress-bar{flex:1;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;max-width:300px}
.progress-fill{height:100%;background:var(--primary);transition:width .3s;border-radius:3px}
/* === ARCHITECTURE TAB === */
.arch-container{max-width:900px;margin:0 auto}
.arch-svg-container{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:24px;margin-bottom:20px;overflow-x:auto}
.arch-svg{width:100%;min-width:600px;height:auto}
/* === DETAIL TAB === */
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:20px}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s}
.detail-card:hover{border-color:var(--primary)}
.detail-card.expanded{grid-column:1/-1}
.detail-card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.detail-card-icon{font-size:24px}
.detail-card-title{font-size:16px;font-weight:700;flex:1}
.detail-card-expand{font-size:12px;color:var(--text-2);padding:4px 8px;background:var(--surface-2);border-radius:6px}
.detail-card-desc{font-size:13px;color:var(--text-2);line-height:1.5}
.detail-card-body{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none}
.detail-card.expanded .detail-card-body{display:block}
.detail-section-title{font-size:13px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px}
.tool-item,.handoff-item{font-size:13px;padding:8px 12px;background:var(--surface-2);border-radius:6px;margin-bottom:6px}
.tool-item strong,.handoff-item strong{color:var(--primary)}
.rule-item{font-size:13px;padding:8px 12px;border-radius:6px;margin-bottom:6px;border-left:3px solid}
.rule-item.guardrail{background:#fee2e2;border-left-color:var(--danger)}
.rule-item.constraint{background:#fef3c7;border-left-color:var(--warning)}
.rule-item.escalation{background:#fff7ed;border-left-color:#c2410c}
.rule-item.routing{background:#eff6ff;border-left-color:var(--primary)}
/* === MATRIX === */
.matrix-container{overflow-x:auto;margin-top:16px}
.matrix-table{width:100;border-collapse:collapse;font-size:13px}
.matrix-table th,.matrix-table td{border:1px solid var(--border);padding:8px 10px;text-align:center;vertical-align:middle}
.matrix-table th{background:var(--surface-2);font-weight:600;font-size:12px;position:sticky;top:0}
.matrix-table td{background:var(--surface)}
.matrix-from{font-weight:500;font-size:12px;text-align:left;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.matrix-yes{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.matrix-no{color:#cbd5e1;font-size:16px}
/* === SCENARIOS LIST === */
.scenario-list{margin-top:16px}
.scenario-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.scenario-item:hover{border-color:var(--primary)}
.scenario-item-name{font-size:15px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.scenario-item-name .type-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.scenario-item-desc{font-size:13px;color:var(--text-2)}
.scenario-item-meta{font-size:12px;color:var(--text-2);margin-top:6px;display:flex;gap:12px}
/* === CONCEPT CARDS === */
.concept-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:16px}
.concept-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.concept-card-title{font-size:14px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.concept-card-title .card-icon{font-size:20px}
.concept-card-desc{font-size:12px;color:var(--text-2);line-height:1.5}
.concept-card.hub{border-left:3px solid #2563eb}
.concept-card.handoff{border-left:3px solid #059669}
.concept-card.guardrail{border-left:3px solid #dc2626}
.concept-card.rule-constraint{border-left:3px solid #d97706}
.concept-card.rule-escalation{border-left:3px solid #c2410c}
.concept-card.rule-routing{border-left:3px solid #0891b2}
/* === LOADING === */
.loading-spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}
.skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--border) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* === SCROLLBAR === */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#cbd5e1}
/* === NO DATA STATE === */
.no-data-state{text-align:center;padding:60px 20px;color:var(--text-2)}
.no-data-state .icon{font-size:48px;margin-bottom:16px}
.no-data-state h3{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px}
.no-data-state p{font-size:14px;max-width:400px;margin:0 auto 20px}
</style>
</head>
<body>
<div class="layout">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">🤖</span>
      <div class="header-title">
        <span data-i18n="siteTitle">Agent Architecture Designer</span>
        <span data-i18n="siteSubtitle">Hub-and-Spoke Multi-Agent</span>
      </div>
    </div>
    <div class="header-right">
      <button class="lang-btn" id="lang-zh" onclick="setLocale('zh')">中文</button>
      <button class="lang-btn" id="lang-en" onclick="setLocale('en')">EN</button>
    </div>
  </header>

  <div class="main">
    <!-- Sidebar: Agent List -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title" data-i18n="agentList">Agent 列表</div>
        <button class="new-agent-btn" onclick="createNewAgent()">
          <span>+</span> <span data-i18n="newAgent">新建 Agent</span>
        </button>
      </div>
      <div class="agent-list" id="agent-list">
        <div class="empty-hint" data-i18n="noAgents">暂无 Agent，点击上方按钮创建</div>
      </div>
      <div class="sidebar-footer">
        <div style="font-size:12px;color:var(--text-2)" data-i18n="savedInfo">已自动保存到 data/agents.json</div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="content" id="main-content">
      <!-- Agent Detail View (shown when agent selected) -->
      <div id="agent-detail" style="display:none">
        <!-- Agent Header -->
        <div class="agent-header">
          <div class="agent-header-top">
            <input class="agent-name-input" id="agent-name" data-i18n-placeholder="agentNamePlaceholder" placeholder="输入 Agent 名称..." oninput="updateAgentName(this.value)">
            <div class="agent-header-meta">
              <span><span data-i18n="created">创建于</span> <span id="agent-created"></span></span>
              <span><span data-i18n="updated">更新于</span> <span id="agent-updated"></span></span>
            </div>
          </div>
          <!-- Version Tabs -->
          <div style="display:flex;align-items:center;gap:0;margin-bottom:-1px">
            <div class="version-tabs" id="version-tabs"></div>
            <button class="new-version-btn" onclick="createNewVersion()">+ <span data-i18n="newVersion">新建版本</span></button>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="tabs">
          <button class="tab active" data-tab="version" onclick="switchTab('version')">
            <span data-i18n="tabVersion">版本内容</span>
          </button>
          <button class="tab" data-tab="demos" onclick="switchTab('demos')">
            <span data-i18n="tabDemos">演示管理</span>
            <span class="tab-badge" id="demo-count">0</span>
          </button>
          <button class="tab" data-tab="arch" onclick="switchTab('arch')">
            <span data-i18n="tabArch">架构图</span>
          </button>
          <button class="tab" data-tab="detail" onclick="switchTab('detail')">
            <span data-i18n="tabDetail">详情</span>
          </button>
        </div>

        <!-- Tab Content -->
        <div class="tab-content" id="tab-content"></div>
      </div>

      <!-- Empty State (no agent selected) -->
      <div id="empty-state" class="no-data-state">
        <div class="icon">🎯</div>
        <h3 data-i18n="selectAgent">请选择一个 Agent</h3>
        <p data-i18n="selectAgentHint">从左侧列表选择一个 Agent，或点击"新建 Agent"创建一个新的 Agent</p>
      </div>
    </main>
  </div>
</div>

<!-- Demo Overlay (fullscreen) -->
<div class="demo-overlay" id="demo-overlay" style="display:none">
  <div class="demo-header">
    <div class="demo-header-left">
      <button class="back-btn" onclick="exitDemo()">← <span data-i18n="back">返回</span></button>
      <div class="demo-title">
        <span id="demo-agent-name"></span>
        <span id="demo-scenario-name"></span>
      </div>
    </div>
    <select class="scenario-select" id="demo-scenario-select" onchange="switchDemoScenario(this.value)"></select>
  </div>
  <div class="demo-body">
    <div class="demo-chat">
      <div class="demo-chat-header">
        <span data-i18n="chatPanel">聊天面板</span>
        <span class="scenario-tag" id="demo-chat-scenario-tag"></span>
      </div>
      <div class="demo-messages" id="demo-messages"></div>
    </div>
    <div class="demo-agent" id="demo-agent-view"></div>
  </div>
  <div class="demo-footer">
    <div class="demo-controls">
      <button class="btn btn-secondary btn-sm" id="btn-reset" onclick="resetDemo()">↺ <span data-i18n="reset">重置</span></button>
      <button class="btn btn-primary btn-sm" id="btn-prev" onclick="prevStep()">◀ <span data-i18n="prev">上一步</span></button>
      <button class="btn btn-primary btn-sm" id="btn-next" onclick="nextStep()"><span data-i18n="next">下一步</span> ▶</button>
      <button class="btn btn-success btn-sm" id="btn-autoplay" onclick="toggleAutoPlay()">▶ <span data-i18n="autoPlay">自动播放</span></button>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="demo-step-label" id="demo-step-label">Step: 0/0</div>
      <div class="progress-bar"><div class="progress-fill" id="demo-progress" style="width:0%"></div></div>
    </div>
  </div>
</div>

<!-- Generating Overlay -->
<div class="generating-overlay" id="generating-overlay" style="display:none">
  <div class="generating-card">
    <div class="generating-title">
      <div class="loading-spinner"></div>
      <span data-i18n="generating">正在生成演示...</span>
    </div>
    <div class="generating-steps" id="generating-steps"></div>
    <div class="generating-stream" id="generating-stream"></div>
    <div class="generating-actions">
      <button class="btn btn-secondary" onclick="cancelGenerating()"><span data-i18n="cancel">取消</span></button>
    </div>
  </div>
</div>

/* =============================================
   APP STATE
   ============================================= */
let locale = 'zh';
let agents = [];
let currentAgentId = null;
let currentVersion = null;
let currentDemoIndex = 0;
let currentTab = 'version';
let autoPlayTimer = null;
let autoPlaying = false;
// Demo playback state
let demoState = {
  agentId: null,
  version: null,
  demoIndex: 0,
  scenarioIndex: 0,
  step: 0
};

const CATEGORIES = ['catCustomerService', 'catOperations', 'catFinance', 'catHR', 'catIT', 'catSales', 'catOther'];
const CATEGORY_COLORS = {
  catCustomerService: '#2563eb',
  catOperations: '#059669',
  catFinance: '#7c3aed',
  catHR: '#dc2626',
  catIT: '#d97706',
  catSales: '#0891b2',
  catOther: '#64748b'
};

/* =============================================
   UTILITY FUNCTIONS
   ============================================= */
function t(key) {
  const val = I18N[locale][key];
  if (val === undefined) return key;
  return typeof val === 'object' ? val : val;
}

function getCurrentAgent() {
  return agents.find(a => a.id === currentAgentId);
}

function getCurrentAgentVersion() {
  const agent = getCurrentAgent();
  if (!agent || !currentVersion) return null;
  return agent.versions.find(v => v.version === currentVersion);
}

function getCurrentDemo() {
  const ver = getCurrentAgentVersion();
  if (!ver || ver.demos.length === 0) return null;
  return ver.demos[currentDemoIndex] || null;
}

function generateId() {
  return 'agent-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function saveAgents() {
  // In browser, we'd save to localStorage; in static mode, just keep in memory
  try {
    localStorage.setItem('agent_designer_data', JSON.stringify(agents));
  } catch(e) {}
}

function loadAgents() {
  return fetch('./data/agents.json')
    .then(r => r.json())
    .catch(() => ({ agents: [] }));
}

/* =============================================
   I18N
   ============================================= */
function setLocale(l) {
  locale = l;
  document.documentElement.lang = l;
  document.getElementById('lang-zh').classList.toggle('active', l === 'zh');
  document.getElementById('lang-en').classList.toggle('active', l === 'en');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = I18N[l][key];
    if (val !== undefined) el.textContent = val;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    const val = I18N[l][key];
    if (val !== undefined) el.placeholder = val;
  });
  if (currentAgentId) renderAgentDetail();
}

/* =============================================
   AGENT LIST
   ============================================= */
function renderAgentList() {
  const container = document.getElementById('agent-list');
  if (agents.length === 0) {
    container.innerHTML = `<div class="empty-hint">${t('noAgents')}</div>`;
    return;
  }
  container.innerHTML = agents.map(a => {
    const isActive = a.id === currentAgentId;
    const latestVer = a.versions && a.versions.length > 0 ? a.versions[a.versions.length - 1] : null;
    const category = latestVer ? latestVer.description.category : '';
    const catKey = CATEGORIES.find(c => t(c) === category) || 'catOther';
    const catColor = CATEGORY_COLORS[catKey];
    return `
      <div class="agent-item ${isActive ? 'active' : ''}" onclick="selectAgent('${a.id}')">
        <span class="agent-item-icon">🤖</span>
        <span class="agent-item-name">${escHtml(a.name)}</span>
        <span class="agent-item-category" style="background:${catColor}22;color:${catColor}">${escHtml(category || '其他')}</span>
        <button class="agent-item-delete" onclick="event.stopPropagation();deleteAgent('${a.id}')" title="删除">×</button>
      </div>
    `;
  }).join('');
}

function selectAgent(id) {
  currentAgentId = id;
  const agent = getCurrentAgent();
  if (agent && agent.versions.length > 0) {
    currentVersion = agent.versions[agent.versions.length - 1].version;
  } else {
    currentVersion = null;
  }
  renderAgentList();
  renderAgentDetail();
}

function createNewAgent() {
  const name = locale === 'zh' ? '新 Agent' : 'New Agent';
  const newAgent = {
    id: generateId(),
    name: name,
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    currentVersion: 'v1.0',
    versions: [{
      version: 'v1.0',
      createdAt: new Date().toISOString(),
      description: {
        intro: '',
        applicableScenarios: '',
        capabilities: '',
        systemConnections: '',
        businessImpact: '',
        category: locale === 'zh' ? '客户服务' : 'Customer Service'
      },
      demos: []
    }]
  };
  agents.push(newAgent);
  saveAgents();
  currentAgentId = newAgent.id;
  currentVersion = 'v1.0';
  renderAgentList();
  renderAgentDetail();
}

function deleteAgent(id) {
  if (!confirm(locale === 'zh' ? '确定删除此 Agent？' : 'Are you sure you want to delete this Agent?')) return;
  agents = agents.filter(a => a.id !== id);
  saveAgents();
  if (currentAgentId === id) {
    currentAgentId = agents.length > 0 ? agents[agents.length - 1].id : null;
    currentVersion = currentAgentId ? getCurrentAgent().versions[getCurrentAgent().versions.length - 1].version : null;
  }
  renderAgentList();
  if (currentAgentId) renderAgentDetail();
  else document.getElementById('agent-detail').style.display = 'none';
}

function updateAgentName(name) {
  const agent = getCurrentAgent();
  if (!agent) return;
  agent.name = name;
  agent.updatedAt = new Date().toISOString();
  saveAgents();
  renderAgentList();
}

/* =============================================
   VERSION MANAGEMENT
   ============================================= */
function renderVersionTabs() {
  const agent = getCurrentAgent();
  if (!agent) return;
  const container = document.getElementById('version-tabs');
  container.innerHTML = agent.versions.map(v => `
    <button class="version-tab ${v.version === currentVersion ? 'active' : ''}" onclick="switchVersion('${v.version}')">
      ${v.version}
    </button>
  `).join('');
}

function switchVersion(v) {
  currentVersion = v;
  renderVersionTabs();
  renderAgentDetail();
}

function createNewVersion() {
  const agent = getCurrentAgent();
  if (!agent) return;
  // Copy latest version as new
  const latest = agent.versions[agent.versions.length - 1];
  const parts = latest.version.split('.');
  parts[1] = String(parseInt(parts[1] || 0) + 1);
  const newVersion = parts.join('.');
  agent.versions.push({
    version: newVersion,
    createdAt: new Date().toISOString(),
    description: JSON.parse(JSON.stringify(latest.description)),
    demos: [] // new version starts with no demos
  });
  agent.updatedAt = new Date().toISOString();
  currentVersion = newVersion;
  saveAgents();
  renderVersionTabs();
  renderAgentDetail();
}

/* =============================================
   TAB SYSTEM
   ============================================= */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  renderTabContent();
}

function renderTabContent() {
  const container = document.getElementById('tab-content');
  if (currentTab === 'version') renderVersionTab(container);
  else if (currentTab === 'demos') renderDemosTab(container);
  else if (currentTab === 'arch') renderArchTab(container);
  else if (currentTab === 'detail') renderDetailTab(container);
}

function renderAgentDetail() {
  const agent = getCurrentAgent();
  const detail = document.getElementById('agent-detail');
  const empty = document.getElementById('empty-state');
  if (!agent) {
    detail.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }
  detail.style.display = 'flex';
  detail.style.flexDirection = 'column';
  empty.style.display = 'none';
  document.getElementById('agent-name').value = agent.name;
  document.getElementById('agent-created').textContent = formatDate(agent.createdAt);
  document.getElementById('agent-updated').textContent = formatDate(agent.updatedAt);
  renderVersionTabs();
  const ver = getCurrentAgentVersion();
  document.getElementById('demo-count').textContent = ver ? ver.demos.length : 0;
  renderTabContent();
}

/* =============================================
   VERSION TAB (描述性内容)
   ============================================= */
function renderVersionTab(container) {
  const ver = getCurrentAgentVersion();
  const desc = ver ? ver.description : { intro: '', applicableScenarios: '', capabilities: '', systemConnections: '', businessImpact: '', category: '' };
  const cats = CATEGORIES.map(c => `<option value="${t(c)}" ${desc.category === t(c) ? 'selected' : ''}>${t(c)}</option>`).join('');
  container.innerHTML = `

function selectDemo(i) {

function deleteDemo(i) {
  const ver = getCurrentAgentVersion();
  if (!ver) return;
  ver.demos.splice(i, 1);

  document.getElementById('demo-count').textContent = ver.demos.length;
  renderDemosTab(document.getElementById('tab-content'));

function exportDemo(i) {
  const ver = getCurrentAgentVersion();

  downloadFile(`agent-demo-${ver.demos[i].version}.json`, data, 'application/json');
}

/* =============================================

function generateDemo() {
  const ver = getCurrentAgentVersion();
  if (!ver) return;
  showGeneratingOverlay();
  // Simulate LLM generation with mock data based on description
  const steps = [t('generatingStep1'), t('generatingStep2'), t('generatingStep3'), t('generatingStep4')];
  let stepIdx = 0;
  const stream = document.getElementById('generating-stream');
  const stepLabel = document.getElementById('generating-steps');
  function nextStep() {
    if (stepIdx < steps.length) {
      stepLabel.textContent = steps[stepIdx];
      stream.innerHTML += `<div class="thinking">▸ ${steps[stepIdx]}</div>`;
      stream.scrollTop = stream.scrollHeight;
      stepIdx++;
      setTimeout(nextStep, 800 + Math.random() * 600);
    } else {
      stream.innerHTML += `<div class="done">✓ ${t('generatingStep4')}</div>`;
      stream.scrollTop = stream.scrollHeight;
      setTimeout(() => {
        hideGeneratingOverlay();
        // Create new demo version using the airline data as template
        const demoVerNum = ver.demos.length + 1;
        // Use a simplified mock based on agent description
        const mockDemo = generateMockDemo(demoVerNum, ver.description);
        ver.demos.push(mockDemo);
        currentDemoIndex = ver.demos.length - 1;
        saveAgents();
        document.getElementById('demo-count').textContent = ver.demos.length;
        switchTab('demos');
      }, 500);
    }
  }
  nextStep();
}

/* =============================================
   DEMO PLAYBACK
   ============================================= */
function startDemo(demoIndex) {
  const ver = getCurrentAgentVersion();
  if (!ver || !ver.demos[demoIndex]) return;
  currentDemoIndex = demoIndex;
  const demo = ver.demos[demoIndex];
  const agent = getCurrentAgent();
  demoState = {
    agentId: agent.id,
    version: ver.version,
    demoIndex: demoIndex,
    scenarioIndex: 0,
    step: 0
  };
  // Setup scenario selector
  const sel = document.getElementById('demo-scenario-select');
  sel.innerHTML = demo.scenarios.map((s, i) => `<option value="${i}">${s.name || s.nameEn}</option>`).join('');
  document.getElementById('demo-agent-name').textContent = agent.name;
  document.getElementById('demo-scenario-name').textContent = `- Demo ${demo.version}`;
  switchDemoScenario(0);
  document.getElementById('demo-overlay').style.display = 'flex';
}

function switchDemoScenario(idx) {
  demoState.scenarioIndex = parseInt(idx);
  demoState.step = 0;
  autoPlaying = false;
  if (autoPlayTimer) { clearTimeout(autoPlayTimer); autoPlayTimer = null; }
  renderDemoStep();
}

function renderDemoStep() {
  const ver = getCurrentAgentVersion();
  if (!ver) return;
  const demo = ver.demos[demoState.demoIndex];
  if (!demo) return;
  const scenario = demo.scenarios[demoState.scenarioIndex];
  if (!scenario) return;
  const steps = scenario.steps || [];
  const step = demoState.step;
  // Update scenario tag
  document.getElementById('demo-chat-scenario-tag').textContent = scenario.name || scenario.nameEn || '';
  // Render messages up to current step
  const messagesEl = document.getElementById('demo-messages');
  let html = '';
  for (let i = 0; i <= step && i < steps.length; i++) {
    const s = steps[i];
    html += renderMessage(s, i);
  }
  messagesEl.innerHTML = html;
  messagesEl.scrollTop = messagesEl.scrollHeight;
  // Update right panel
  renderDemoAgentView(demo, step, scenario);
  // Update progress
  const total = steps.length;
  document.getElementById('demo-step-label').textContent = `${t('step')}: ${step + 1}/${total}`;
  document.getElementById('demo-progress').style.width = total > 0 ? ((step + 1) / total * 100) + '%' : '0%';
  // Update buttons
  document.getElementById('btn-prev').disabled = step === 0;
  document.getElementById('btn-next').disabled = step >= total - 1;
  // Update autoplay button
  const autoBtn = document.getElementById('btn-autoplay');
  if (autoPlaying) {
    autoBtn.textContent = '⏸ ' + (locale === 'zh' ? '暂停' : 'Pause');
  } else {
    autoBtn.textContent = '▶ ' + t('autoPlay');
  }
}

function renderMessage(s, index) {
  const typeClass = `msg-${s.type}`;
  const labelMap = {
    customer: s.agent === 'customer' ? (locale === 'zh' ? '客户' : 'Customer') : '',
    agent: getAgentName(s.agent),
    tool_call: `🔧 ${s.toolName || ''}`,
    handoff: `🔄 ${locale === 'zh' ? '转接' : 'Handoff'}`,
    guardrail: '🛡️ Guardrail',
    constraint: '⚠️ Constraint',
    escalation: '🔶 Escalation',
    routing: '🔵 Routing'
  };
  let ruleBadge = '';
  if (['guardrail', 'constraint', 'escalation', 'routing'].includes(s.type)) {
    ruleBadge = `<div class="msg-rule ${s.type}">${s.ruleName || ''}</div>`;
  }
  const label = labelMap[s.type] || '';
  const bubble = s.content || '';
  return `<div class="msg ${typeClass}"><div class="msg-label">${label}</div>${ruleBadge}<div class="msg-bubble">${escHtml(bubble)}</div></div>`;
}

function renderDemoAgentView(demo, step, scenario) {
  const container = document.getElementById('demo-agent-view');
  const steps = scenario.steps || [];
  const currentStep = steps[step] || {};
  const activeAgentId = currentStep.agent || 'triage';
  const allAgents = [demo.architecture.triageAgent, ...(demo.architecture.spokeAgents || [])];
  const activeAgent = allAgents.find(a => a.id === activeAgentId || a.name === activeAgentId) || allAgents[0];
  const appliedRules = (demo.architecture.businessRules || []).filter(r => (r.appliesTo || []).includes(activeAgentId));
  // Runner events up to current step
  const events = steps.slice(0, step + 1).filter(s => s.type === 'tool_call' || s.type === 'handoff' || ['guardrail', 'constraint', 'escalation', 'routing'].includes(s.type));
  container.innerHTML = `
    <div class="demo-agent-section">
      <div class="demo-agent-section-title">⭐ <span data-i18n="triage">${t('triage')}</span></div>
      <div class="agent-active-card">
        <span class="agent-active-icon">${activeAgent.icon || '🤖'}</span>
        <div>
          <div class="agent-active-name">${escHtml(activeAgent.name)}</div>
          <div class="agent-active-role">${escHtml(activeAgent.description || '').substring(0, 50)}...</div>
        </div>
        <span class="agent-active-badge">ACTIVE</span>
      </div>
    </div>
    <div class="demo-agent-section">
      <div class="demo-agent-section-title">🔀 <span>${locale === 'zh' ? 'Agent 路由网格' : 'Agent Routing Grid'}</span></div>
      <div class="agent-grid">
        ${allAgents.map(a => {
          const isActive = a.id === activeAgentId || a.name === activeAgentId;
          return `<div class="agent-mini-card ${isActive ? 'active' : ''}">
            <span class="agent-mini-icon">${a.icon || '🤖'}</span>
            <span class="agent-mini-name">${escHtml(a.name)}</span>
            <span class="active-dot"></span>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="demo-agent-section">
      <div class="demo-agent-section-title">📋 <span>${locale === 'zh' ? '对话上下文' : 'Context'}</span></div>
      <div class="context-box">
        <div class="context-row"><span class="context-label">${t('contextSession')}</span><span class="context-value">SID-${Date.now().toString().slice(-6)}</span></div>
        <div class="context-row"><span class="context-label">${t('contextTurn')}</span><span class="context-value">${step + 1}</span></div>
        <div class="context-row"><span class="context-label">${t('contextIntent')}</span><span class="context-value">${escHtml(currentStep.content || '').substring(0, 30)}...</span></div>
      </div>
    </div>
    <div class="demo-agent-section">
      <div class="demo-agent-section-title">🛡️ <span data-i18n="rulesStatus">${t('rulesStatus')}</span></div>
      <div class="rules-grid">
        ${appliedRules.map(r => {
          const hasTriggered = steps.slice(0, step + 1).some(s => s.ruleName === r.name);
          const status = hasTriggered ? (s => s.ruleType === 'guardrail' ? 'failed' : 'passed')(currentStep) : 'pending';
          return `<div class="rule-mini-card">
            <div class="rule-mini-name">${r.name}</div>
            <span class="rule-mini-status ${status}">${status === 'passed' ? t('rulePassed') : status === 'failed' ? t('ruleFailed') : t('rulePending')}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="demo-agent-section">
      <div class="demo-agent-section-title">⚙️ <span data-i18n="runnerEvents">${t('runnerEvents')}</span></div>
      <div class="events-list">
        ${events.slice(-5).map((ev, i) => {
          const evType = ev.type === 'tool_call' ? 'tool' : ['guardrail','constraint','escalation','routing'].includes(ev.type) ? 'error' : 'info';
          return `<div class="event-item ${evType}">[${i+1}] ${escHtml(ev.toolName || ev.content || ev.type)}</div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function nextStep() {
  const ver = getCurrentAgentVersion();
  if (!ver) return;
  const demo = ver.demos[demoState.demoIndex];
  if (!demo) return;
  const scenario = demo.scenarios[demoState.scenarioIndex];
  if (!scenario) return;
  if (demoState.step < (scenario.steps || []).length - 1) {
    demoState.step++;
    renderDemoStep();
  }
}

function prevStep() {
  if (demoState.step > 0) {
    demoState.step--;
    renderDemoStep();
  }
}

function resetDemo() {
  demoState.step = 0;
  autoPlaying = false;
  if (autoPlayTimer) { clearTimeout(autoPlayTimer); autoPlayTimer = null; }
  renderDemoStep();
}

function toggleAutoPlay() {
  autoPlaying = !autoPlaying;
  if (autoPlaying) {
    autoPlayLoop();
  } else {
    if (autoPlayTimer) { clearTimeout(autoPlayTimer); autoPlayTimer = null; }
    renderDemoStep();
  }
}

function autoPlayLoop() {
  if (!autoPlaying) return;
  const ver = getCurrentAgentVersion();
  if (!ver) return;
  const demo = ver.demos[demoState.demoIndex];
  if (!demo) return;
  const scenario = demo.scenarios[demoState.scenarioIndex];
  if (!scenario) return;
  if (demoState.step < (scenario.steps || []).length - 1) {
    demoState.step++;
    renderDemoStep();
    autoPlayTimer = setTimeout(autoPlayLoop, 1500);
  } else {
    autoPlaying = false;
    renderDemoStep();
  }
}

function exitDemo() {
  autoPlaying = false;
  if (autoPlayTimer) { clearTimeout(autoPlayTimer); autoPlayTimer = null; }
  document.getElementById('demo-overlay').style.display = 'none';
}

function getAgentName(agentIdOrName) {
  const ver = getCurrentAgentVersion();
  if (!ver) return agentIdOrName;
  const demo = ver.demos[demoState.demoIndex];
  if (!demo) return agentIdOrName;
  const allAgents = [demo.architecture.triageAgent, ...(demo.architecture.spokeAgents || [])];
  const found = allAgents.find(a => a.id === agentIdOrName || a.name === agentIdOrName);
  return found ? found.name : agentIdOrName;
}

function renderArchTab(container) {
  const demo = getCurrentDemo();
  if (!demo || !demo.architecture) {
    container.innerHTML = `<div class="no-data-state" style="padding:40px"><div class="icon">🏗️</div><h3>${locale === 'zh' ? '暂无架构图' : 'No Architecture Yet'}</h3><p>${locale === 'zh' ? '请先生成演示版本' : 'Please generate a demo first'}</p></div>`;
    return;
  }
  const arch = demo.architecture;
  const triage = arch.triageAgent;
  const spokes = arch.spokeAgents || [];
  const rules = arch.businessRules || [];
  const cx = 320, cy = 220, r = 160;
  const spokePositions = spokes.map((s, i) => {
    const angle = (2 * Math.PI * i) / spokes.length - Math.PI / 2;
    return { agent: s, x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  });
  // Build SVG
  const lines = [];
  // Triage -> Spokes
  spokePositions.forEach(sp => {
    lines.push(`<line x1="${cx+50}" y1="${cy}" x2="${sp.x-50}" y2="${sp.y}" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow-start)"/>`);

  // Spoke -> Triage
  spokePositions.forEach(sp => {
    lines.push(`<line x1="${sp.x-50}" y1="${sp.y}" x2="${cx+50}" y2="${cy}" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-small)"/>`);
  });
  const agentNodes = [
    `<rect x="${cx-50}" y="${cy-35}" width="100" height="70" rx="10" fill="${triage.color || '#2563eb'}" filter="url(#shadow)"/>
     <text x="${cx}" y="${cy-8}" text-anchor="middle" fill="#fff" font-size="22">${triage.icon || '🔀'}</text>
     <text x="${cx}" y="${cy+18}" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">${escHtml(triage.name)}</text>`
  ];
  spokePositions.forEach(sp => {
    agentNodes.push(`<rect x="${sp.x-55}" y="${sp.y-30}" width="110" height="60" rx="8" fill="${sp.agent.color || '#059669'}" filter="url(#shadow)"/>
     <text x="${sp.x}" y="${sp.y-5}" text-anchor="middle" fill="#fff" font-size="18">${sp.agent.icon || '🤖'}</text>
     <text x="${sp.x}" y="${sp.y+15}" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">${escHtml(sp.agent.name)}</text>`);
  });
  container.innerHTML = `
    <div class="arch-container">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:16px" data-i18n="archTitle">${t('archTitle')}</h2>
      <div class="arch-svg-container">
        <svg class="arch-svg" viewBox="0 0 640 440" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".2"/></filter>
            <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker>
            <marker id="arrow-start" markerWidth="8" markerHeight="8" refX="0" refY="3" orient="auto"><path d="M8,0 L8,6 L0,3 z" fill="#94a3b8"/></marker>
            <marker id="arrow-small" markerWidth="5" markerHeight="5" refX="4" refY="2" orient="auto"><path d="M0,0 L0,4 L4,2 z" fill="#94a3b8"/></marker>
          </defs>
          ${lines.join('\n')}
          ${agentNodes.join('\n')}
        </svg>
      </div>
      <h3 style="font-size:15px;font-weight:700;margin-bottom:12px" data-i18n="archConcept">${t('archConcept')}</h3>
      <div class="concept-cards">
        <div class="concept-card hub">
          <div class="concept-card-title"><span class="card-icon">🔀</span>${t('hubConcept')}</div>
          <div class="concept-card-desc">${t('hubConceptDesc')}</div>
        </div>
        <div class="concept-card handoff">
          <div class="concept-card-title"><span class="card-icon">🔄</span>${t('handoffConcept')}</div>
          <div class="concept-card-desc">${t('handoffConceptDesc')}</div>
        </div>
        <div class="concept-card guardrail">
          <div class="concept-card-title"><span class="card-icon">🛡️</span>${t('guardrailConcept')}</div>
          <div class="concept-card-desc">${t('guardrailConceptDesc')}</div>
        </div>
        <div class="concept-card rule-constraint">
          <div class="concept-card-title"><span class="card-icon">⚠️</span>${t('constraintConcept')}</div>
          <div class="concept-card-desc">${t('constraintConceptDesc')}</div>
        </div>
        <div class="concept-card rule-escalation">
          <div class="concept-card-title"><span class="card-icon">🔶</span>${t('escalationConcept')}</div>
          <div class="concept-card-desc">${t('escalationConceptDesc')}</div>
        </div>
        <div class="concept-card rule-routing">
          <div class="concept-card-title"><span class="card-icon">🔵</span>${t('routingConcept')}</div>
          <div class="concept-card-desc">${t('routingConceptDesc')}</div>
        </div>
      </div>
    </div>
  `;
}

/* =============================================
   DETAIL TAB
   ============================================= */
function renderDetailTab(container) {
  const demo = getCurrentDemo();
  if (!demo || !demo.architecture) {
    container.innerHTML = `<div class="no-data-state" style="padding:40px"><div class="icon">📋</div><h3>${locale === 'zh' ? '暂无详情' : 'No Details Yet'}</h3><p>${locale === 'zh' ? '请先生成演示版本' : 'Please generate a demo first'}</p></div>`;
    return;
  }
  const arch = demo.architecture;
  const triage = arch.triageAgent;
  const spokes = arch.spokeAgents || [];
  const rules = arch.businessRules || [];
  const allAgents = [triage, ...spokes];
  container.innerHTML = `
    <div>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">${locale === 'zh' ? 'Agent 详情' : 'Agent Details'}</h2>
      <div class="detail-grid">
        ${allAgents.map(a => {
          const appliedRules = rules.filter(r => (r.appliesTo || []).includes(a.id));
          return `
            <div class="detail-card" onclick="this.classList.toggle('expanded')">
              <div class="detail-card-header">
                <span class="detail-card-icon">${a.icon || '🤖'}</span>
                <span class="detail-card-title">${escHtml(a.name)}</span>
                <span class="detail-card-expand">${locale === 'zh' ? '展开' : 'Expand'}</span>
              </div>
              <div class="detail-card-desc">${escHtml(a.description || '').substring(0, 80)}...</div>
              <div class="detail-card-body">
                <div class="detail-section-title">${t('detailTools')}</div>
                ${(a.tools || []).map(t => `<div class="tool-item"><strong>${escHtml(t.name)}</strong> — ${escHtml(t.description)}</div>`).join('')}
                <div class="detail-section-title">${t('detailHandoffs')}</div>
                ${(a.handoffs || []).map(h => `<div class="handoff-item">→ ${escHtml(h.label || h.agentId)}</div>`).join('')}
                ${appliedRules.length > 0 ? `
                  <div class="detail-section-title">${t('detailRules')}</div>
                  ${appliedRules.map(r => `<div class="rule-item ${r.type}"><strong>${escHtml(r.name)}</strong> (${r.type})<br><span style="font-size:12px;color:var(--text-2)">${escHtml(r.description)}</span></div>`).join('')}
                ` : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
      ${renderMatrix(arch, allAgents)}
      <h2 style="font-size:18px;font-weight:700;margin:20px 0 16px">${locale === 'zh' ? '业务场景' : 'Business Scenarios'}</h2>
      <div class="scenario-list">
        ${(demo.scenarios || []).map((s, i) => `
          <div class="scenario-item">
            <div class="scenario-item-name">
              ${escHtml(s.name || s.nameEn || 'Scenario ' + (i+1))}
              <span class="type-badge" style="background:${s.type === 'guardrail-trigger' ? '#fee2e2;color:var(--danger)' : s.type === 'flight-delay' ? '#d1fae5;color:var(--success)' : '#eff6ff;color:var(--primary)'}">${s.type ? (t('scenarioTypes')[s.type] || s.type) : 'standard'}</span>
            </div>
            <div class="scenario-item-desc">${escHtml(s.description || '')}</div>
            <div class="scenario-item-meta"><span>📋 ${(s.steps || []).length} ${t('detailSteps')}</span></div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderMatrix(arch, allAgents) {
  const matrix = arch.handoffMatrix && arch.handoffMatrix.from_to ? arch.handoffMatrix.from_to : {};
  const agentIds = allAgents.map(a => a.id);
  const agentMap = Object.fromEntries(allAgents.map(a => [a.id, a]));
  const rows = [];
  agentIds.forEach(fromId => {
    const targets = matrix[fromId] || [];
    const cells = agentIds.map(toId => {
      if (fromId === toId) return `<td><span class="matrix-no">·</span></td>`;
      const has = targets.includes(toId);
      if (has) {
        const from = agentMap[fromId];
        return `<td><span class="matrix-yes" style="background:${from.color}22;color:${from.color}">${from.icon || '→'}→</span></td>`;
      }
      return `<td><span class="matrix-no">✕</span></td>`;
    });
    const from = agentMap[fromId];
    rows.push(`<tr><td class="matrix-from"><span style="color:${from.color}">${from.icon || ''}</span> ${escHtml(from.name)}</td>${cells.join('')}</tr>`);
  });
  const headers = agentIds.map(id => {
    const a = agentMap[id];
    return `<th><span style="color:${a.color}">${a.icon || ''}</span><br>${escHtml(a.name)}</th>`;
  });
  return `
    <div style="margin-top:20px">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">${locale === 'zh' ? 'Handoff 关系矩阵' : 'Handoff Relationship Matrix'}</h3>
      <div class="matrix-container">
        <table class="matrix-table">
          <thead><tr><th>${t('matrixFromTo')}</th>${headers.join('')}</tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>
      </div>
      <div style="display:flex;gap:16px;margin-top:10px;font-size:12px;color:var(--text-2)">
        <span><span class="matrix-yes" style="background:#d1fae5;color:var(--success)">→→</span> = ${locale === 'zh' ? '可转接' : 'Handoff OK'}</span>
        <span><span class="matrix-no">✕</span> = ${locale === 'zh' ? '无直接转接' : 'No direct handoff'}</span>
        <span><span class="matrix-no">·</span> = ${locale === 'zh' ? '自身' : 'Self'}</span>
      </div>
    </div>
  `;
}

/* =============================================
   UTILS
   ============================================= */
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function downloadFile(filename, content, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* =============================================
   INIT
   ============================================= */
async function init() {
  try {
    const data = await loadAgents();
    agents = data.agents || [];
  } catch(e) {
    agents = [];
  }
  setLocale(locale);
  renderAgentList();
  // Auto-select first agent if available
  if (agents.length > 0) {
    selectAgent(agents[0].id);
  }
}

init();
</script>
</body>
</html>
